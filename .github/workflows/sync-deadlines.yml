name: Sync Conference Deadlines

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync ccfddl data
        run: python scripts/sync_ccfddl.py

      - name: Crawl official deadline pages
        run: python scripts/crawl_official_deadlines.py

      - name: Detect year rollover
        run: python scripts/detect_year_rollover.py

      - name: Merge and validate
        run: |
          python scripts/merge_deadlines.py
          python scripts/validate_conferences.py
          python scripts/generate_ics.py
          python scripts/generate_report.py

      - name: Create update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/auto-update-conference-deadlines
          commit-message: "chore: auto-update conference deadlines"
          title: "chore: auto-update conference deadlines"
          body: |
            Automated NODIDDL deadline sync.

            This PR is generated by the scheduled workflow. Please review pending updates before merging.
          labels: automation, deadlines
          delete-branch: true
