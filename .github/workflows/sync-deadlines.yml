name: Sync Conference Deadlines

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync mlciv data
        run: python scripts/sync_mlciv.py

      - name: Sync ccfddl data
        run: python scripts/sync_ccfddl.py

      - name: Crawl official deadline pages
        run: python scripts/crawl_official_deadlines.py

      - name: Detect year rollover
        run: python scripts/detect_year_rollover.py

      - name: Merge and validate
        run: |
          python scripts/merge_deadlines.py
          python scripts/validate_conferences.py
          python scripts/generate_ics.py
          python scripts/generate_report.py

      - name: Commit synced data
        run: |
          git add data/generated data/pending_updates.json
          if git diff --cached --quiet; then
            echo "No deadline updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-update conference deadlines"
          git push
